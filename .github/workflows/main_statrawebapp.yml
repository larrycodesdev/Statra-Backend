name: Build and deploy PHP app to Azure Web App - StatraWebApp

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'

      - name: Cache composer dependencies
        uses: actions/cache@v4
        with:
          path: vendor
          key: composer-${{ hashFiles('composer.lock') }}
          restore-keys: composer-

      - name: Install composer dependencies
        run: composer install --no-dev --optimize-autoloader --prefer-dist --no-progress

      - name: Upload artifact for deployment job
        uses: actions/upload-artifact@v4
        with:
          name: php-app
          path: .

  deploy:
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Download artifact from build job
        uses: actions/download-artifact@v4
        with:
          name: php-app

      - name: Deploy to Azure Web App
        uses: azure/webapps-deploy@v3
        id: deploy-to-webapp
        with:
          app-name: 'StatraWebApp'
          slot-name: 'Production'
          package: .
          publish-profile: ${{ secrets.AZUREAPPSERVICE_PUBLISHPROFILE_7051479EEAFC4622B5177E595F5371C1 }}

      - name: Run database migrations
        run: |
          PROFILE='${{ secrets.AZUREAPPSERVICE_PUBLISHPROFILE_7051479EEAFC4622B5177E595F5371C1 }}'
          KUDU_HOST=$(echo "$PROFILE" | grep -oP 'publishUrl="\K[^"]+' | head -1 | sed 's/:.*//')
          KUDU_USER=$(echo "$PROFILE" | grep -oP 'userName="\K[^"]+' | head -1)
          KUDU_PASS=$(echo "$PROFILE" | grep -oP 'userPWD="\K[^"]+' | head -1)
          echo "Migrating via $KUDU_HOST"
          RESPONSE=$(curl -s -w "\n%{http_code}" -X POST \
            "https://$KUDU_HOST/api/command" \
            -H "Content-Type: application/json" \
            --user "$KUDU_USER:$KUDU_PASS" \
            -d '{"command":"php artisan migrate --force 2>&1","dir":"/home/site/wwwroot"}')
          HTTP_CODE=$(echo "$RESPONSE" | tail -1)
          BODY=$(echo "$RESPONSE" | head -1)
          echo "$BODY"
          if [ "$HTTP_CODE" != "200" ]; then exit 1; fi
