<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>STATRA — Check-in Web App API</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="stylesheet" href="/docs/assets/swagger-ui.css"
        onerror="this.onerror=null;this.href='https://unpkg.com/swagger-ui-dist@5/swagger-ui.css'">
  <style>
    body { margin: 0; }
    #swagger-ui .topbar { background-color: #1b1b1b; }
  </style>
</head>
<body>
  <div id="swagger-ui"></div>
  <script>
    function loadScript(local, cdn, cb) {
      var s = document.createElement('script');
      s.src = local;
      s.onload = cb;
      s.onerror = function() { var f = document.createElement('script'); f.src = cdn; f.onload = cb; document.head.appendChild(f); };
      document.head.appendChild(s);
    }
    loadScript(
      '/docs/assets/swagger-ui-bundle.js',
      'https://unpkg.com/swagger-ui-dist@5/swagger-ui-bundle.js',
      function() {
        SwaggerUIBundle({
          url: '/api-docs/check-in/check-in-api-docs.json',
          dom_id: '#swagger-ui',
          presets: [SwaggerUIBundle.presets.apis, SwaggerUIBundle.SwaggerUIStandalonePreset],
          layout: 'BaseLayout',
          deepLinking: true,
          persistAuthorization: true,
          docExpansion: 'none',
          filter: true,
        });
      }
    );
  </script>
</body>
</html>
